services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: financedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradeai-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/financedb
      JWT_SECRET: supersecretjwtkey123
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "cd src/config && bunx prisma migrate deploy && bunx prisma generate && cd /app && bun run src/config/seed.ts && bun run src/server.ts"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradeai-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data: